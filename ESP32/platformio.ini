; PlatformIO Configuration for ESP32 Sensor Nodes
; Switch between projects by changing the default_envs

[platformio]
default_envs = node_main

; ===== Common configuration for all environments =====
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Required libraries for all ESP32 sensor nodes
lib_deps = 
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit SGP30 Sensor@^2.0.0
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit BusIO@^1.16.1

; Monitor settings
monitor_filters = 
    esp32_exception_decoder
    time

; Build flags
build_flags = 
    -DCORE_DEBUG_LEVEL=3

; ===== Node Main (Default) =====
[env:node_main]
build_src_filter = +<Node_Main.cpp>

; ===== Master Node =====
[env:master_node]
build_src_filter = +<Master_Node_Main.cpp>

; ===== VOC DHT Test =====
[env:voc_dht_test]
build_src_filter = +<VOC_DHT_print_code.cpp>

; ===== MQ3 Calibration =====
[env:mq3_calibration]
build_src_filter = +<MQ3_Calibration_Code.cpp>

; ===== MAC Address Reader =====
[env:mac_address]
build_src_filter = +<MacAddress.cpp>

; ===== Node MQTT (for Raspberry Pi communication) =====
[env:node_mqtt]
build_src_filter = +<Node_MQTT.cpp>
lib_deps = 
    ${env.lib_deps}
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.3
