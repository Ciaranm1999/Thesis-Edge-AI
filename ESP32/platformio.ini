; ESP32 PlatformIO Configuration for ESP32 Sensor Nodes
; Switch between projects by changing the default_envs

[platformio]
default_envs = master_node

; ===== Common configuration for all environments =====
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.f_cpu = 160000000L

; Required libraries for all ESP32 sensor nodes
lib_deps = 
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit SGP30 Sensor@^2.0.0
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit BusIO@^1.16.1

; Monitor settings
monitor_filters = 
    esp32_exception_decoder
    time

; Build flags
build_flags = 
    -DCORE_DEBUG_LEVEL=3

; ===== Node Main (Default) =====
[env:node_main]
build_src_filter = +<Node_Main.cpp>

; ===== Master Node =====
[env:master_node]
build_src_filter = +<Master_Node_Main.cpp>
lib_deps = 
    ${env.lib_deps}
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.3

; ===== VOC DHT Test =====
[env:voc_dht_test]
build_src_filter = +<VOC_DHT_print_code.cpp>

; ===== MQ3 Calibration =====
[env:mq3_calibration]
build_src_filter = +<MQ3_Calibration_Code.cpp>
lib_deps =
    ${env.lib_deps}

; ===== MAC Address Reader =====
[env:mac_address]
build_src_filter = +<MacAddress.cpp>
lib_deps =

; ===== NVS Erase Utility =====
[env:nvs_erase]
build_src_filter = +<NVS_Erase.cpp>
lib_deps =

; ===== Node MQTT (for Raspberry Pi communication) =====
[env:node_mqtt]
build_src_filter = +<Node_MQTT.cpp>
lib_deps =
    ${env.lib_deps}
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.3

; =============================================================
; ===== THESIS ML BENCHMARKS ==================================
; =============================================================
; Dataset and weight headers live in ML_Training/esp32_datasets/
; Copy (or symlink) that folder to ESP32/include/ before building,
; or add the path directly via build_flags below.

; ===== AIfES Inference Benchmark =====
; Measures energy of float32 forward pass using pre-trained weights.
; Run train_model.py first to generate: aifes_weights.h
[env:aifes_inference]
build_src_filter = +<aifes_inference.cpp>
build_flags =
    ${env.build_flags}
    -I../ML_Training/esp32_datasets
lib_deps =
    ${env.lib_deps}
    https://github.com/Fraunhofer-IMS/AIfES_for_Arduino

; ===== TF Lite Micro Inference Benchmark =====
; Measures energy of INT8 quantised forward pass.
; Run train_model.py first to generate: tflm_model.h
; Uses EloquentTinyML which wraps TFLite Micro with ESP32 support.
[env:tflm_inference]
build_src_filter = +<tflm_inference.cpp>
build_flags =
    -I../ML_Training/esp32_datasets
    -DCORE_DEBUG_LEVEL=0
lib_deps =
    ${env.lib_deps}
    https://github.com/eloquentarduino/tflm_esp32
    https://github.com/eloquentarduino/EloquentTinyML
